<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0c0804">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="D&M">
<title>Dulce &amp; Masa · v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ─── */
:root{
  --bg:#0c0804; --bg2:#120b05; --card:#1a1008; --card2:#221609;
  --border:rgba(205,158,60,.17); --border2:rgba(205,158,60,.38);
  --gold:#cd9e3c; --gold2:#ecc060; --gold3:#f5d98a;
  --txt:#f4ead6; --muted:rgba(244,234,214,.58);
  --ok:#74c474; --warn:#ecc060; --danger:#de7272;
  --r:13px; --rSm:9px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

/* ─── RESET ─── */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--txt);
  font-family:'DM Sans',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ─── HEADER ─── */
.hdr{
  position:fixed;top:0;left:0;right:0;z-index:200;
  padding:12px 15px;
  padding-top:calc(12px + var(--safe-top));
  background:linear-gradient(180deg,rgba(26,16,8,.97) 0%,rgba(18,11,5,.93) 100%);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.brand{font-family:'Libre Baskerville',serif;font-size:1.18rem;color:var(--gold2);letter-spacing:.015em}
.brand-tag{font-size:.62rem;color:var(--muted);font-family:'DM Sans',sans-serif;
  text-transform:uppercase;letter-spacing:.07em;margin-top:1px}
.hdr-btns{display:flex;gap:6px}

/* ─── SCROLL AREA ─── */
.main{
  position:fixed;inset:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding-top:calc(72px + var(--safe-top));
  padding-bottom:calc(78px + var(--safe-bot));
}

/* ─── BOTTOM NAV ─── */
.nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  padding:7px 8px;
  padding-bottom:calc(7px + var(--safe-bot));
  background:linear-gradient(0deg,rgba(12,8,4,.98) 0%,rgba(18,11,5,.96) 100%);
  border-top:1px solid var(--border);
  backdrop-filter:blur(12px);
  display:grid;grid-template-columns:repeat(7,1fr);gap:3px;
}
.nb{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 2px;border:1px solid transparent;border-radius:9px;
  background:transparent;color:var(--muted);
  font-size:.56rem;font-weight:700;font-family:'DM Sans',sans-serif;
  letter-spacing:.03em;cursor:pointer;transition:all .18s;
}
.nb .ico{font-size:1.05rem;line-height:1}
.nb.on{color:var(--gold2);border-color:var(--border2);background:rgba(205,158,60,.1)}

/* ─── SECTIONS ─── */
.sec{display:none;padding:13px 13px 0;animation:fi .22s ease}
.sec.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ─── CARD ─── */
.card{
  background:linear-gradient(180deg,rgba(34,22,9,.97) 0%,rgba(26,16,8,.99) 100%);
  border:1px solid var(--border);border-radius:var(--r);
  padding:14px;margin-bottom:11px;
}
.ch{
  font-family:'Libre Baskerville',serif;font-size:.98rem;
  color:var(--gold2);margin-bottom:12px;
  display:flex;align-items:center;gap:7px;
}

/* ─── KPI ─── */
.kpi{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ki{
  background:linear-gradient(180deg,rgba(44,28,12,.82) 0%,rgba(34,22,9,.82) 100%);
  border:1px solid var(--border);border-radius:11px;
  padding:11px 12px;cursor:pointer;transition:border-color .2s,transform .14s;
}
.ki:active{transform:scale(.97)}
.ki:hover{border-color:var(--border2)}
.kv{font-size:1.12rem;font-weight:700;color:var(--gold2)}
.kl{font-size:.63rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-top:2px}

/* ─── FORMS ─── */
.fg{margin-bottom:9px}
label{display:block;font-size:.66rem;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
input,select,textarea{
  width:100%;padding:10px 12px;
  background:rgba(34,22,9,.88);border:1px solid var(--border);
  border-radius:9px;color:var(--txt);
  font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;
  transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;appearance:none;
}
input:focus,select:focus,textarea:focus{
  border-color:rgba(205,158,60,.48);
  box-shadow:0 0 0 3px rgba(205,158,60,.09);
}
select option{background:#1a1008}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px}

/* ─── BUTTONS ─── */
.btn{
  padding:10px 14px;border:1px solid var(--border);border-radius:10px;
  background:linear-gradient(180deg,rgba(44,28,12,.92) 0%,rgba(34,22,9,.92) 100%);
  color:var(--txt);font-family:'DM Sans',sans-serif;
  font-weight:700;font-size:.83rem;cursor:pointer;
  transition:all .17s;width:100%;
}
.btn:active{transform:scale(.98)}
.btn:hover{border-color:var(--border2)}
.btn-p{background:linear-gradient(135deg,var(--gold3) 0%,var(--gold) 100%);
  color:#15090200;color:#1a0800;border-color:transparent}
.btn-p:hover{filter:brightness(1.06)}
.btn-ok{color:var(--ok);border-color:rgba(116,196,116,.2)}
.btn-w{color:var(--warn);border-color:rgba(236,192,96,.2)}
.btn-d{color:var(--danger);border-color:rgba(222,114,114,.2)}
.btn-sm{padding:7px 11px;font-size:.76rem;width:auto;border-radius:8px}

/* ─── LIST ITEMS ─── */
.li{
  background:linear-gradient(180deg,rgba(40,26,11,.75) 0%,rgba(32,20,8,.75) 100%);
  border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;margin-bottom:7px;
}
.li-t{font-weight:700;font-size:.88rem}
.li-s{font-size:.74rem;color:var(--muted);margin-top:3px}

/* ─── BADGES ─── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;
  border-radius:100px;font-size:.62rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.04em}
.b-ok{background:rgba(116,196,116,.14);color:var(--ok)}
.b-w{background:rgba(236,192,96,.14);color:var(--warn)}
.b-d{background:rgba(222,114,114,.14);color:var(--danger)}

/* ─── SYNC BAR ─── */
.syncbar{
  font-size:.71rem;color:var(--muted);
  background:rgba(34,22,9,.7);border:1px solid var(--border);
  border-radius:8px;padding:7px 10px;margin-top:10px;
  display:flex;align-items:center;gap:6px;
}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
.dot.ok{background:var(--ok)} .dot.syncing{background:var(--warn);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ─── STOCK ROWS ─── */
.srow{display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;border-bottom:1px solid var(--border);
  font-size:.8rem;cursor:pointer;transition:opacity .15s}
.srow:last-child{border-bottom:none;padding-bottom:0}
.srow:active{opacity:.7}

/* ─── TOAST ─── */
.toast{
  position:fixed;z-index:999;
  bottom:calc(88px + var(--safe-bot));
  left:50%;transform:translateX(-50%) translateY(12px);
  background:rgba(34,22,9,.97);border:1px solid var(--border2);
  border-radius:100px;padding:9px 18px;
  font-size:.81rem;font-weight:600;color:var(--txt);
  backdrop-filter:blur(10px);opacity:0;
  transition:all .24s ease;pointer-events:none;
  white-space:nowrap;max-width:90%;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── MODAL ─── */
.overlay{
  position:fixed;inset:0;z-index:800;
  background:rgba(8,5,2,.88);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.modal{
  background:linear-gradient(180deg,rgba(34,22,9,.99) 0%,rgba(26,16,8,.99) 100%);
  border:1px solid var(--border2);border-radius:17px;
  padding:22px;max-width:340px;width:100%;
}
.modal-t{font-family:'Libre Baskerville',serif;font-size:1.12rem;
  color:var(--gold2);margin-bottom:9px}
.modal-b{font-size:.83rem;color:var(--muted);line-height:1.6;margin-bottom:17px}
.modal-a{display:flex;flex-direction:column;gap:7px}
.hidden{display:none!important}

/* ─── SECTION TITLE ─── */
.sec-lbl{font-size:.65rem;color:var(--muted);font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;
  padding-left:2px;border-left:2px solid var(--gold);padding-left:8px}

/* ─── RECETA ADD ─── */
.rec-row{display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;border-bottom:1px solid var(--border);font-size:.84rem}
.rec-row:last-child{border-bottom:none;padding-bottom:0}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header class="hdr">
  <div>
    <div class="brand">Dulce &amp; Masa</div>
    <div class="brand-tag">Sync v2 · Sin conflictos</div>
  </div>
  <div class="hdr-btns">
    <button class="btn btn-sm" id="btnSync">⟳ Sync</button>
    <button class="btn btn-sm btn-p" id="btnUpload">☁ Subir</button>
  </div>
</header>

<!-- ═══ MAIN ═══ -->
<div class="main">

  <!-- HOME -->
  <section class="sec on" id="s-home">
    <div class="card">
      <div class="ch">✨ Hoy</div>
      <div class="kpi" id="kpiHome"></div>
      <div id="lowPanel" class="hidden" style="margin-top:12px"></div>
    </div>
    <div class="card">
      <div class="ch">⚡ Acceso rápido</div>
      <div class="g2" style="gap:8px">
        <button class="btn" onclick="go('ventas')">💸 Venta</button>
        <button class="btn" onclick="go('pedidos')">📋 Pedido</button>
        <button class="btn" onclick="go('compras')">🛒 Compra</button>
        <button class="btn" onclick="go('prod')">🏭 Producción</button>
      </div>
    </div>
    <div class="card">
      <div class="ch">🗄 Herramientas</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="btn btn-ok" onclick="exportJSON()">↓ Exportar</button>
        <button class="btn btn-w" onclick="importJSON()">↑ Importar</button>
        <button class="btn" onclick="configDrive()">⚙ Drive URL</button>
        <button class="btn btn-d" onclick="undoLast()">↩ Deshacer</button>
        <button class="btn btn-d" onclick="confirmDeleteAll()" style="grid-column:1/-1"> Borrar todos los datos</button>
      </div>
    </div>
    <div class="syncbar" id="syncBar"><span class="dot" id="syncDot"></span><span id="syncTxt">Iniciando…</span></div>
  </section>

  <!-- VENTAS -->
  <section class="sec" id="s-ventas">
    <div class="sec-lbl">Registrar venta</div>
    <div class="card">
      <div class="fg"><label>Producto</label><select id="vRec"></select></div>
      <div class="g2">
        <div class="fg"><label>Unidades</label><input id="vUni" type="number" min="1" value="1" inputmode="numeric"></div>
        <div class="fg"><label>Precio / u</label><input id="vPre" type="number" step="0.01" min="0" inputmode="decimal"></div>
      </div>
      <div class="fg"><label>Canal</label>
        <select id="vCan"><option>directo</option><option>encargo</option><option>delivery</option><option>evento</option><option>otro</option></select>
      </div>
      <div class="fg"><label>Nota</label><input id="vNota" placeholder="Opcional"></div>
      <button class="btn btn-p" onclick="addVenta()">Guardar venta</button>
    </div>
    <div class="card"><div class="ch">🧾 Recientes</div><div id="vList"></div></div>
  </section>

  <!-- PEDIDOS -->
  <section class="sec" id="s-pedidos">
    <div class="sec-lbl">Nuevo pedido</div>
    <div class="card">
      <div class="fg"><label>Cliente</label><input id="pCli" placeholder="Nombre del cliente"></div>
      <div class="g2">
        <div class="fg"><label>Entrega</label><input id="pFec" type="date"></div>
        <div class="fg"><label>Anticipo</label><input id="pAnt" type="number" step="0.01" min="0" inputmode="decimal"></div>
      </div>
      <div class="fg"><label>Producto</label><select id="pRec"></select></div>
      <div class="g2">
        <div class="fg"><label>Cantidad</label><input id="pCan" type="number" min="1" value="1" inputmode="numeric"></div>
        <div class="fg"><label>Precio / u</label><input id="pPre" type="number" step="0.01" min="0" inputmode="decimal"></div>
      </div>
      <button class="btn btn-p" onclick="addPedido()">Guardar pedido</button>
    </div>
    <div class="card"><div class="ch">📌 Activos</div><div id="pList"></div></div>
  </section>

  <!-- COMPRAS -->
  <section class="sec" id="s-compras">
    <div class="sec-lbl">Registrar compra</div>
    <div class="card">
      <div class="fg"><label>Ingrediente</label><input id="cIng" placeholder="Nombre del ingrediente" autocomplete="off"></div>
      <div class="g2">
        <div class="fg"><label>Cantidad</label><input id="cQty" type="number" step="0.001" min="0" inputmode="decimal"></div>
        <div class="fg"><label>Precio / u</label><input id="cPre" type="number" step="0.01" min="0" inputmode="decimal"></div>
      </div>
      <div class="fg"><label>Proveedor</label><input id="cPro" placeholder="Opcional" autocomplete="off"></div>
      <button class="btn btn-p" onclick="addCompra()">Guardar compra</button>
    </div>
    <div class="card"><div class="ch">🧾 Recientes</div><div id="cList"></div></div>
  </section>

  <!-- PRODUCCIÓN -->
  <section class="sec" id="s-prod">
    <div class="sec-lbl">Registrar producción</div>
    <div class="card">
      <div class="fg"><label>Receta</label><select id="prRec"></select></div>
      <div class="g2">
        <div class="fg"><label>Tandas</label><input id="prTan" type="number" min="1" value="1" inputmode="numeric"></div>
        <div class="fg"><label>Unidades reales</label><input id="prReal" type="number" min="0" placeholder="Auto" inputmode="numeric"></div>
      </div>
      <button class="btn btn-p" onclick="addProduccion()">Guardar producción</button>
    </div>
    <div class="card"><div class="ch">📦 Recientes</div><div id="prList"></div></div>
  </section>

  <!-- MERMAS -->
  <section class="sec" id="s-mermas">
    <div class="sec-lbl">Registrar merma</div>
    <div class="card">
      <div class="fg"><label>Receta</label><select id="mRec"></select></div>
      <div class="g2">
        <div class="fg"><label>Cantidad</label><input id="mCan" type="number" min="1" value="1" inputmode="numeric"></div>
        <div class="fg"><label>Motivo</label>
          <select id="mMot"><option value="">— Seleccionar —</option>
            <option>Daño</option><option>Vencido</option><option>Quemado</option>
            <option>Mal almacenamiento</option><option>Otro</option></select>
        </div>
      </div>
      <button class="btn btn-p" onclick="addMerma()">Guardar merma</button>
    </div>
    <div class="card"><div class="ch">🧾 Recientes</div><div id="mList"></div></div>
  </section>

  <!-- FINANZAS -->
  <section class="sec" id="s-fin">
    <div class="sec-lbl">Resumen financiero</div>
    <div class="card"><div class="ch">💼 KPIs</div><div class="kpi" id="finKpi"></div></div>
    <div class="card">
      <div class="ch">💵 Extracción rápida</div>
      <div class="g2" style="align-items:flex-end">
        <div class="fg" style="margin-bottom:0"><label>Monto</label><input id="fMon" type="number" step="0.01" min="0" inputmode="decimal" placeholder="$0.00"></div>
        <button class="btn btn-p" onclick="addExtraccion()">Registrar</button>
      </div>
    </div>
    <div class="card">
      <div class="ch">🗃 Recetas</div>
      <div class="g2" style="margin-bottom:12px">
        <div class="fg" style="margin-bottom:0"><label>Nombre</label><input id="rNom" placeholder="Ej: Alfajor" autocomplete="off"></div>
        <div class="fg" style="margin-bottom:0"><label>Rinde (u)</label><input id="rRin" type="number" min="1" value="12" inputmode="numeric"></div>
      </div>
      <button class="btn" onclick="addReceta()" style="margin-bottom:12px">+ Agregar receta</button>
      <div id="recList"></div>
    </div>
  </section>

</div><!-- /main -->

<!-- ═══ BOTTOM NAV ═══ -->
<nav class="nav">
  <button class="nb on" id="t-home" onclick="go('home')"><span class="ico">🏠</span>Inicio</button>
  <button class="nb" id="t-ventas" onclick="go('ventas')"><span class="ico">💸</span>Ventas</button>
  <button class="nb" id="t-pedidos" onclick="go('pedidos')"><span class="ico">📋</span>Pedidos</button>
  <button class="nb" id="t-compras" onclick="go('compras')"><span class="ico">🛒</span>Compras</button>
  <button class="nb" id="t-prod" onclick="go('prod')"><span class="ico">🏭</span>Prod.</button>
  <button class="nb" id="t-mermas" onclick="go('mermas')"><span class="ico">📉</span>Mermas</button>
  <button class="nb" id="t-fin" onclick="go('fin')"><span class="ico">💼</span>Finanzas</button>
</nav>

<div class="toast" id="toast"></div>

  <div class="modal">
    <div class="modal-t" id="modalT"></div>
    <div class="modal-b" id="modalB"></div>
    <div class="modal-a" id="modalA"></div>
  </div>
</div>

<script>
'use strict';
/* ════════════════════════════════════════════════════════
   DULCE & MASA · Móvil v2
   Arquitectura: Event Sourcing
   ────────────────────────────────────────────────────────
   CÓMO FUNCIONA EL SYNC SIN CONFLICTOS:
   • Cada acción genera un EVENTO con UUID único + timestamp.
   • Los eventos son inmutables y nunca se editan.
   • Al sincronizar: union(eventosLocales ∪ eventosDrive) por UUID.
   • Si el mismo evento existe en ambos, se usa una sola vez.
   • No hay "último gana" ni prompts de resolución manual.
   • El estado se DERIVA repasando todos los eventos ordenados.
   ════════════════════════════════════════════════════════ */

// ── CONSTANTES ──────────────────────────────────────────
const SECTIONS = ['home','ventas','pedidos','compras','prod','mermas','fin'];
const DB_NAME   = 'dm-v2';
const TZ        = 'America/Argentina/Buenos_Aires';

// ── ESTADO GLOBAL ────────────────────────────────────────
let ingredientes = [];
let recetas = [];
let ventas = [];
let pedidos = [];
let producciones = [];
let mermas = [];
let extracciones = [];
let proveedores = [];
let historialCompras = [];
let stockProductos = [];
let lotesIngredientes = [];
let catRecetas = ['Tortas','Cupcakes','Galletas','Facturas','Panes','Alfajores','Otros'];
let gastosFijos = [];
let prestamos = [];
let metas = [];
let capital_ajustes = [];

let nextId = {
  ing: 1, rec: 1, prod: 1, venta: 1, comp: 1,
  prov: 1, pedido: 1, ext: 1, prestamo: 1, lote: 1, merma: 1
};

let gasUrl = localStorage.getItem('gas_url') || '';
let lowOpen = false;

// ── UUID ─────────────────────────────────────────────────
function uuidv4() {
  if (crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

// Función para generar IDs únicos - igual que en la app de escritorio
function nextIdGenerator(prefix) {
  const id = nextId[prefix] || 1;
  nextId[prefix] = id + 1;
  return id;
}

// Función buildData - igual que en la app de escritorio
function buildData() {
  return {
    _version: 2,
    _guardado: new Date().toISOString(),  // Simplificado para móvil
    ingredientes, recetas, producciones, ventas, pedidos,
    stockProductos, proveedores, historialCompras, lotesIngredientes, catRecetas, gastosFijos, extracciones, prestamos, metas, mermas,
    capital_ajustes: capital_ajustes || [],
    nextId: {
      ing: nextId?.ing || 1, rec: nextId?.rec || 1, prod: nextId?.prod || 1,
      venta: nextId?.venta || 1, comp: nextId?.comp || 1,
      prov: nextId?.prov || 1, pedido: nextId?.pedido || pedidos?.length + 1 || 1,
      ext: nextId?.ext || 1, prestamo: nextId?.prestamo || 1, lote: nextId?.lote || 1,
      merma: nextId?.merma || 1
    }
  };
}

// ── FECHAS / FORMATO ─────────────────────────────────────
const now   = () => new Date().toLocaleString('sv',{timeZone:TZ}).replace(' ','T');
const today = () => new Date().toLocaleDateString('sv',{timeZone:TZ});
const $     = id  => document.getElementById(id);
const money = n   => '$' + Number(n||0).toLocaleString('es-AR',{minimumFractionDigits:0,maximumFractionDigits:0});

// ── TOAST ────────────────────────────────────────────────
let _tt;
function toast(msg, ms=2800) {
  const el=$('toast'); el.textContent=msg; el.classList.add('on');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('on'),ms);
}

// ── INDEXEDDB ────────────────────────────────────────────
function openDB() {
  return new Promise((ok,fail)=>{
    const r=indexedDB.open(DB_NAME,1);
    r.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains('kv')) db.createObjectStore('kv');
    };
    r.onsuccess=e=>ok(e.target.result);
    r.onerror=e=>fail(e.target.error);
  });
}
async function dbGet(key) {
  const db=await openDB();
  return new Promise((ok,fail)=>{
    const r=db.transaction('kv','readonly').objectStore('kv').get(key);
    r.onsuccess=()=>ok(r.result); r.onerror=()=>fail(r.error);
  });
}
async function dbSet(key,val) {
  const db=await openDB();
  return new Promise((ok,fail)=>{
    const r=db.transaction('kv','readwrite').objectStore('kv').put(val,key);
    r.onsuccess=ok; r.onerror=()=>fail(r.error);
  });
}

/**
 * deriveState(events) → Recorre todos los eventos ordenados por timestamp
 * y reconstruye el estado completo. Esto es la base del sync sin conflictos.
 */
function deriveState(evts) {
  const s = {
    ingredientes:{}, recetas:{}, ventas:{}, pedidos:{},
    compras:{}, producciones:{}, mermas:{}, extracciones:{}, proveedores:{}
  };

  const sorted = [...evts].sort((a,b)=>a.ts.localeCompare(b.ts));

  for (const ev of sorted) {
    const p = ev.payload;
    switch(ev.type) {

      // ── Recetas
      case 'add_receta':
        s.recetas[p.id] = {...p}; break;
      case 'del_receta':
        delete s.recetas[p.id]; break;

      // ── Ingredientes
      case 'add_ingrediente':
        if (!s.ingredientes[p.id])
          s.ingredientes[p.id] = {...p, stock:Number(p.stock||0)};
        break;
      case 'adj_stock':
        if (s.ingredientes[p.id])
          s.ingredientes[p.id].stock = Math.max(0, Number(s.ingredientes[p.id].stock||0)+Number(p.delta||0));
        break;

      // ── Ventas
      case 'add_venta':
        s.ventas[p.id] = {...p}; break;
      case 'undo_venta':
        delete s.ventas[p.id]; break;

      // ── Pedidos
      case 'add_pedido':
        s.pedidos[p.id] = {...p}; break;
      case 'upd_pedido':
        if(s.pedidos[p.id]) s.pedidos[p.id]={...s.pedidos[p.id],...p}; break;
      case 'undo_pedido':
        delete s.pedidos[p.id]; break;

      // ── Compras
      case 'add_compra': {
        s.compras[p.id] = {...p};
        const ing = s.ingredientes[p.ingId];
        if (ing) {
          ing.stock = Number(ing.stock||0)+Number(p.qty||0);
          if (p.precio>0) ing.precio = p.precio;
        } else if (p.ingId) {
          s.ingredientes[p.ingId] = {
            id:p.ingId, nombre:p.ingNombre||'?',
            unidad:p.ingUnidad||'kg', stock:Number(p.qty||0),
            min:0, precio:p.precio||0
          };
        }
        break;
      }
      case 'undo_compra': {
        const c = s.compras[p.id];
        if (c && s.ingredientes[c.ingId]) {
          // CORREGIDO: Reducir stock al deshacer compra
          s.ingredientes[c.ingId].stock = Math.max(0,
            Number(s.ingredientes[c.ingId].stock||0) - Number(c.qty||0));
        }
        delete s.compras[p.id]; 
        break;
      }

      // ── Producción
      case 'add_produccion':
        s.producciones[p.id]={...p}; break;
      case 'undo_produccion':
        delete s.producciones[p.id]; break;

      // ── Mermas
      case 'add_merma':
        s.mermas[p.id]={...p}; break;
      case 'undo_merma':
        delete s.mermas[p.id]; break;

      // ── Extracciones
      case 'add_extraccion':
        s.extracciones[p.id]={...p}; break;
      case 'undo_extraccion':
        delete s.extracciones[p.id]; break;

      // ── Proveedores
      case 'add_proveedor':
        if(!s.proveedores[p.id]) s.proveedores[p.id]={...p}; break;
    }
  }

  return {
    ingredientes: Object.values(s.ingredientes),
    recetas:      Object.values(s.recetas),
    ventas:       Object.values(s.ventas),
    pedidos:      Object.values(s.pedidos),
    compras:      Object.values(s.compras),
    producciones: Object.values(s.producciones),
    mermas:       Object.values(s.mermas),
    extracciones: Object.values(s.extracciones),
    proveedores:  Object.values(s.proveedores)
  };
}

/**
 * dispatch(type, payload) → Crea un evento, lo persiste y actualiza estado.
 */
async function dispatch(type, payload) {
  const ev = {id:uuidv4(), type, payload:{...payload}, ts:now(), device:deviceId};
  events.push(ev);
  state = deriveState(events);
  await dbSet('events', events);
  renderAll();
  return ev;
}

/**
 * mergeEvents(a, b) → Une dos logs de eventos por UUID.
 * Matemáticamente es una UNIÓN de conjuntos → nunca hay conflictos.
 * Si el mismo evento aparece en ambos lados, se incluye solo una vez.
 */
function mergeEvents(local, remote) {
  const map = {};
  for (const ev of [...local, ...remote]) map[ev.id] = ev;
  return Object.values(map).sort((a,b)=>a.ts.localeCompare(b.ts));
}

// ── PERSISTENCIA ─────────────────────────────────────────
async function loadLocal() {
  const saved = await dbGet('events');
  events = Array.isArray(saved) ? saved : [];
  state  = deriveState(events);
}

function setSyncStatus(text, mode='') {
  const dot=$('syncDot'), txt=$('syncTxt');
  txt.textContent = text;
  dot.className = 'dot'+(mode?' '+mode:'');
}

async function fetchDriveData() {
  const res = await fetch(gasUrl+'?action=load&t='+Date.now());
  if(!res.ok) throw new Error('HTTP '+res.status);
  const r = await res.json();
  if(r.status==='empty') return null;
  if(r.status!=='ok') throw new Error(r.message||'Error Drive');
  const raw = typeof r.data==='string' ? JSON.parse(r.data) : r.data;
  return raw;
}

// Convierte datos del formato antiguo al nuevo sistema de eventos
function convertLegacyDataToEvents(legacyData) {
  const convertedEvents = [];
  const baseTimestamp = now();
  
  // Convertir ingredientes
  if (Array.isArray(legacyData.ingredientes)) {
    legacyData.ingredientes.forEach(ing => {
      convertedEvents.push({
        id: uuidv4(),
        type: 'add_ingrediente',
        payload: {
          id: ing.id,
          nombre: ing.nombre,
          unidad: ing.unidad || 'kg',
          stock: ing.stock || 0,
          min: ing.min || 0,
          precio: ing.precio || 0
        },
        ts: baseTimestamp,
        device: 'legacy-import'
      });
    });
  }
  
  // Convertir recetas
  if (Array.isArray(legacyData.recetas)) {
    legacyData.recetas.forEach(rec => {
      convertedEvents.push({
        id: uuidv4(),
        type: 'add_receta',
        payload: {
          id: rec.id,
          nombre: rec.nombre,
          rinde: rec.rinde || 1,
          precio: rec.precioVenta || 0
        },
        ts: baseTimestamp,
        device: 'legacy-import'
      });
    });
  }
  
  // Convertir ventas - PRESERVAR TIMESTAMP ORIGINAL
  if (Array.isArray(legacyData.ventas)) {
    legacyData.ventas.forEach(v => {
      // Usar la fecha de la venta como timestamp para mantener orden cronológico
      let eventTs = baseTimestamp;
      if (v.fecha) {
        try {
          const dateObj = new Date(v.fecha);
          if (!isNaN(dateObj.getTime())) {
            eventTs = dateObj.toISOString();
          }
        } catch(e) {
          console.warn('Fecha inválida en venta:', v.fecha, 'usando timestamp base');
        }
      }
      convertedEvents.push({
        id: uuidv4(),
        type: 'add_venta',
        payload: {
          id: v.id,
          fecha: v.fecha,
          recetaId: v.recetaId,
          unidades: v.unidades,
          precio: v.precio,
          canal: v.canal || 'directo',
          nota: v.nota || '',
          cobrado: v.cobrado !== false
        },
        ts: eventTs,
        device: 'legacy-import'
      });
    });
  }
  
  // Convertir pedidos - PRESERVAR TIMESTAMP ORIGINAL
  if (Array.isArray(legacyData.pedidos)) {
    legacyData.pedidos.forEach(p => {
      // Usar la fecha del pedido como timestamp para mantener orden cronológico
      let eventTs = baseTimestamp;
      if (p.fecha) {
        try {
          const dateObj = new Date(p.fecha);
          if (!isNaN(dateObj.getTime())) {
            eventTs = dateObj.toISOString();
          }
        } catch(e) {
          console.warn('Fecha inválida en pedido:', p.fecha, 'usando timestamp base');
        }
      }
      convertedEvents.push({
        id: uuidv4(),
        type: 'add_pedido',
        payload: {
          id: p.id,
          fecha: p.fecha,
          cliente: p.cliente,
          fechaEntrega: p.fechaEntrega,
          anticipo: p.anticipo || 0,
          estado: p.estado || 'pendiente',
          items: p.items || []
        },
        ts: eventTs,
        device: 'legacy-import'
      });
    });
  }
  
  // Convertir compras
  if (Array.isArray(legacyData.historialCompras)) {
    legacyData.historialCompras.forEach(c => {
      convertedEvents.push({
        id: uuidv4(),
        type: 'add_compra',
        payload: {
          id: c.id,
          ingId: c.ingId,
          ingNombre: c.ingNombre,
          qty: c.qty,
          precio: c.precio,
          fecha: c.fecha,
          provId: c.provId
        },
        ts: timestamp,
        device: 'legacy-import'
      });
    });
  }
  
  // Convertir producciones
  if (Array.isArray(legacyData.producciones)) {
    legacyData.producciones.forEach(p => {
      convertedEvents.push({
        id: uuidv4(),
        type: 'add_produccion',
        payload: {
          id: p.id,
          fecha: p.fecha,
          recetaId: p.recetaId,
          tandas: p.tandas,
          unidadesReales: p.unidadesReales
        },
        ts: timestamp,
        device: 'legacy-import'
      });
    });
  }
  
  // Convertir mermas
  if (Array.isArray(legacyData.mermas)) {
    legacyData.mermas.forEach(m => {
      convertedEvents.push({
        id: uuidv4(),
        type: 'add_merma',
        payload: {
          id: m.id,
          fecha: m.fecha,
          recetaId: m.recetaId,
          cantidad: m.cantidad,
          motivo: m.motivo || 'No especificado'
        },
        ts: timestamp,
        device: 'legacy-import'
      });
    });
  }
  
  // Convertir extracciones
  if (Array.isArray(legacyData.extracciones)) {
    legacyData.extracciones.forEach(e => {
      convertedEvents.push({
        id: uuidv4(),
        type: 'add_extraccion',
        payload: {
          id: e.id,
          fecha: e.fecha,
          tipo: e.tipo || 'retiro',
          monto: e.monto,
          concepto: e.concepto || 'Extracción'
        },
        ts: timestamp,
        device: 'legacy-import'
      });
    });
  }
  
  // Convertir proveedores
  if (Array.isArray(legacyData.proveedores)) {
    legacyData.proveedores.forEach(p => {
      convertedEvents.push({
        id: uuidv4(),
        type: 'add_proveedor',
        payload: {
          id: p.id,
          nombre: p.nombre,
          contacto: p.contacto || '',
          tel: p.tel || '',
          email: p.email || ''
        },
        ts: timestamp,
        device: 'legacy-import'
      });
    });
  }
  
  return convertedEvents.sort((a,b)=>a.ts.localeCompare(b.ts));
}

    headers:{'Content-Type':'text/plain'}, body});

async function syncNow() {
  if(!gasUrl) return configDrive();
  setSyncStatus('Sincronizando','syncing');
  try {
    const remote = await fetchDriveData();

    if(!remote) {
      // Drive vacío -> preguntar si subir
      if(!hasLocalData()) { setSyncStatus('Drive vacío · sin datos locales'); return; }
      showModal(' Drive vacío',
        `Tienes datos locales. ¿Subir a Drive ahora?`,
        [{label:'Sí, subir ', cls:'btn-p', fn:uploadNow},
         {label:'Cancelar',   cls:'',      fn:()=>{}}]);
      return;
    }

    // Hay datos en Drive -> ofrecer opciones
    const localData = buildData();
    const hasDiff = JSON.stringify(localData) !== JSON.stringify(remote);

    if (hasDiff) {
      showModal(' Sincronización necesaria',
        `Hay diferencias entre datos locales y Drive.<br><br>
        ¿Qué quieres hacer?`,
        [
          {label:' Fusionar datos', cls:'btn-p', fn:()=>{
            mergeAndSync(remote);
          }},
          {label:' Reemplazar local', cls:'btn-w', fn:()=>{
            replaceLocalWithRemote(remote);
          }},
          {label:' Reemplazar Drive', cls:'btn-d', fn:()=>{
            replaceRemoteWithLocal();
          }},
          {label:'Cancelar', cls:'', fn:()=>{}}
        ]);
    } else {
      // Ya están sincronizados
      setSyncStatus(`Sync OK · ${now().slice(11,16)}`, 'ok');
      toast(' Ya está sincronizado');
    }
  } catch(e) {
    setSyncStatus('Error: '+e.message);
    toast('Error de sync: '+e.message);
  }
}

// Función auxiliar para verificar si hay datos locales
function hasLocalData() {
  return ingredientes.length > 0 || recetas.length > 0 || ventas.length > 0 || 
         pedidos.length > 0 || producciones.length > 0 || mermas.length > 0;
}

// Fusionar datos locales y remotos
async function mergeAndSync(remote) {
  setSyncStatus('Fusionando datos','syncing');
  try {
    // Fusionar arrays manteniendo IDs únicos
    const merged = {
      ingredientes: mergeArrays(ingredientes, remote.ingredientes || [], 'id'),
      recetas: mergeArrays(recetas, remote.recetas || [], 'id'),
      ventas: mergeArrays(ventas, remote.ventas || [], 'id'),
      pedidos: mergeArrays(pedidos, remote.pedidos || [], 'id'),
      producciones: mergeArrays(producciones, remote.producciones || [], 'id'),
      mermas: mergeArrays(mermas, remote.mermas || [], 'id'),
      extracciones: mergeArrays(extracciones, remote.extracciones || [], 'id'),
      proveedores: mergeArrays(proveedores, remote.proveedores || [], 'id'),
      historialCompras: mergeArrays(historialCompras, remote.historialCompras || [], 'id'),
      stockProductos: mergeArrays(stockProductos, remote.stockProductos || [], 'recetaId'),
      lotesIngredientes: mergeArrays(lotesIngredientes, remote.lotesIngredientes || [], 'id'),
      gastosFijos: mergeArrays(gastosFijos, remote.gastosFijos || [], 'id'),
      prestamos: mergeArrays(prestamos, remote.prestamos || [], 'id'),
      metas: mergeArrays(metas, remote.metas || [], 'id'),
      capital_ajustes: mergeArrays(capital_ajustes, remote.capital_ajustes || [], 'id')
    };

    // Actualizar variables globales
    Object.assign(this, merged);
    await saveLocal();
    await uploadNow(false);

    setSyncStatus(`Fusión OK · ${now().slice(11,16)}`, 'ok');
    toast(' Datos fusionados correctamente');
    renderAll();
  } catch(e) {
    setSyncStatus('Error: '+e.message);
    toast('Error en fusión: '+e.message);
  }
}

// Reemplazar datos locales con los de Drive
async function replaceLocalWithRemote(remote) {

    setSyncStatus(`Reemplazo OK · ${now().slice(11,16)}`, 'ok');
    toast(' Datos locales reemplazados');
    renderAll();
  } catch(e) {
    setSyncStatus('Error: '+e.message);
    toast('Error al reemplazar: '+e.message);
  }
}

    toast('Error al reemplazar Drive: '+e.message);
  }
}

// Función auxiliar para fusionar arrays sin duplicados
function mergeArrays(local, remote, keyField) {
  const merged = [...local];
  const existingKeys = new Set(local.map(item => item[keyField]));
  
  remote.forEach(item => {
    if (!existingKeys.has(item[keyField])) {
      merged.push(item);
    }
  });
  
  return merged;
}

// Función para cargar datos desde objeto data

  pedidos = data.pedidos || [];
  producciones = data.producciones || [];
  mermas = data.mermas || [];
  extracciones = data.extracciones || [];
  proveedores = data.proveedores || [];
  historialCompras = data.historialCompras || [];
  stockProductos = data.stockProductos || [];
  lotesIngredientes = data.lotesIngredientes || [];
  catRecetas = data.catRecetas || ['Tortas','Cupcakes','Galletas','Facturas','Panes','Alfajores','Otros'];
  gastosFijos = data.gastosFijos || [];
  prestamos = data.prestamos || [];
  metas = data.metas || [];
  capital_ajustes = data.capital_ajustes || [];
  
  if (data.nextId) {
    Object.assign(nextId, data.nextId);
  }
}

function configDrive() {
  const url = prompt('Pega la URL de tu Google Apps Script Web App:', gasUrl||'');
  if(url===null) return;
  if(!url.trim().startsWith('https://')) return toast('URL inválida');
  gasUrl = url.trim();
  localStorage.setItem('gas_url', gasUrl);
  toast('✓ URL de Drive configurada');
  setSyncStatus('Drive listo · Presiona Sync', 'ok');
}

const recById  = id => recetas.find(r=>r.id===id);
const ingById  = id => ingredientes.find(i=>i.id===id);
const ingByNom = n  => ingredientes.find(i=>(i.nombre||'').toLowerCase()===n.toLowerCase());
const provByNom= n  => proveedores.find(p=>(p.nombre||'').toLowerCase()===n.toLowerCase());

function stockProducto(recetaId) {
  const prod  = producciones.filter(p=>p.recetaId===recetaId).reduce((a,p)=>a+Number(p.unidadesReales||0),0);
  const vend  = ventas.filter(v=>v.recetaId===recetaId).reduce((a,v)=>a+Number(v.unidades||0),0);
  const merma = mermas.filter(m=>m.recetaId===recetaId).reduce((a,m)=>a+Number(m.cantidad||0),0);
  
  // Descontar pedidos con estado "listo" (producto reservado pero no entregado)
  const pedidosListo = pedidos
    .filter(p=>p.estado==='listo')
    .reduce((a,p)=>a + (p.items||[]).filter(it=>it.recetaId===recetaId).reduce((b,it)=>b+Number(it.cantidad||0),0),0);
  
  const resultado = Math.max(0, prod-vend-merma-pedidosListo);
  
  // Debug: mostrar desglose en consola
  const receta = recetas.find(r=>r.id===recetaId);
  if(receta && receta.nombre?.includes('Donitas')) {
    console.log(`[DEBUG MÓVIL] ${receta.nombre}:`, {
      recetaId,
      producciones: prod,
      ventas: vend,
      mermas: merma,
      pedidosListo: pedidosListo,
      resultado: resultado,
      totalProducciones: producciones.filter(p=>p.recetaId===recetaId).length,
      totalVentas: ventas.filter(v=>v.recetaId===recetaId).length,
      totalPedidosListo: pedidos.filter(p=>p.estado==='listo' && p.items?.some(it=>it.recetaId===recetaId)).length
    });
  }
  
  return resultado;
}

async function addReceta() {
  const nombre = $('rNom').value.trim();
  const rinde  = Number($('rRin').value||0);
  if(!nombre) return toast('Escribe el nombre de la receta');
  
  const nuevaReceta = {
    id: nextIdGenerator('rec'),
    nombre: nombre,
    rinde: rinde || 1,
    precioVenta: 0
  };
  
  recetas.push(nuevaReceta);
  await saveLocal();
  renderAll();
  
  $('rNom').value = '';
  toast(' Receta agregada');
}

async function addVenta() {
  const recetaId = $('vRec').value;
  const uni = Number($('vUni').value||0);
  const pre = Number($('vPre').value||0);
  if(!recetaId||uni<=0||pre<=0) return toast('Completa todos los campos');
  const stk = stockProducto(recetaId);
  if(uni>stk) return toast(`Stock insuficiente · hay ${stk}u`);
  
  const nuevaVenta = {
    id: nextIdGenerator('venta'),
    fecha: today(),
    recetaId: recetaId,
    unidades: uni,
    precio: pre,
    canal: $('vCan').value,
    nota: $('vNota').value.trim(),
    cobrado: true
  };
  
  ventas.push(nuevaVenta);
  await saveLocal();
  renderAll();
  
  $('vUni').value = '1';
  $('vNota').value = '';
  toast(' Venta guardada');
}

async function addPedido() {
  const cliente  = $('pCli').value.trim();
  const recetaId = $('pRec').value;
  const cant     = Number($('pCan').value||0);
  const pre      = Number($('pPre').value||0);
  if(!cliente||!recetaId||cant<=0) return toast('Completa cliente, receta y cantidad');
  
  const nuevoPedido = {
    id: nextIdGenerator('pedido'),
    fecha: today(),
    cliente: cliente,
    fechaEntrega: $('pFec').value || null,
    anticipo: Number($('pAnt').value||0),
    estado: 'pendiente',
    items: [{recetaId, cantidad: cant, precio: pre}]
  };
  
  pedidos.push(nuevoPedido);
  await saveLocal();
  renderAll();
  
  $('pCli').value = '';
  $('pAnt').value = '';
  toast(' Pedido guardado');
}

async function addCompra() {
  const nombre = $('cIng').value.trim();
  const qty    = Number($('cQty').value||0);
  const precio = Number($('cPre').value||0);
  if(!nombre||qty<=0||precio<=0) return toast('Completa ingrediente, cantidad y precio');

  let ing    = ingByNom(nombre);
  let ingId  = ing ? ing.id : nextIdGenerator('ing');
  if(!ing) {
    ingredientes.push({
      id: ingId,
      nombre: nombre,
      unidad: 'kg',
      stock: 0,
      min: 0,
      precio: precio || 0
    });
  }

  let provId = null;
  const pNom = $('cPro').value.trim();
  if(pNom) {
    let prov = provByNom(pNom);
    if(!prov) { 
      provId = nextIdGenerator('prov');
      proveedores.push({id: provId, nombre: pNom});
    }
    else provId = prov.id;
  }

  const nuevaCompra = {
    id: nextIdGenerator('comp'),
    ingId: ingId,
    ingNombre: nombre,
    qty: qty,
    precio: precio,
    fecha: today(),
    provId: provId
  };
  
  historialCompras.push(nuevaCompra);
  
  // Actualizar stock del ingrediente
  if(ing) {
    ing.stock = Number(ing.stock || 0) + qty;
    if(precio > 0) ing.precio = precio;
  }
  
  await saveLocal();
  renderAll();
  
  $('cIng').value = '';
  $('cQty').value = '';
  $('cPre').value = '';
  $('cPro').value = '';
  toast(' Compra guardada');
}

async function addProduccion() {
  const recetaId = $('prRec').value;
  const tandas   = Number($('prTan').value||0);
  const reales   = Number($('prReal').value||0);
  if(!recetaId||tandas<=0) return toast('Selecciona receta y tandas');
  const rec = recById(recetaId);
  const unidadesReales = reales>0 ? reales : (Number(rec?.rinde||0)*tandas);
  
  const nuevaProduccion = {
    id: nextIdGenerator('prod'),
    fecha: today(),
    recetaId: recetaId,
    tandas: tandas,
    unidadesReales: unidadesReales
  };
  
  producciones.push(nuevaProduccion);
  await saveLocal();
  renderAll();
  
  $('prTan').value = '1';
  $('prReal').value = '';
  toast(' Producción guardada');
}

async function addMerma() {
  const recetaId = $('mRec').value;
  const cant     = Number($('mCan').value||0);
  if(!recetaId||cant<=0) return toast('Completa receta y cantidad');
  const stk = stockProducto(recetaId);
  if(cant>stk) return toast(`Stock insuficiente · hay ${stk}u`);
  
  const nuevaMerma = {
    id: nextIdGenerator('merma'),
    fecha: today(),
    recetaId: recetaId,
    cantidad: cant,
    motivo: $('mMot').value || 'No especificado'
  };
  
  mermas.push(nuevaMerma);

  toast(' Merma registrada');
}

async function addExtraccion() {
  const monto = Number($('fMon').value||0);
  if(monto<=0) return toast('Monto inválido');
  
  const nuevaExtraccion = {
    id: nextIdGenerator('ext'),
    fecha: today(),
    tipo: 'retiro',
    monto: monto,
    concepto: 'Extracción móvil'
  };
  
  extracciones.push(nuevaExtraccion);
  await saveLocal();
  renderAll();
  
  $('fMon').value = '';
  toast(' Extracción registrada');
}

// ── IMPORT / EXPORT ──────────────────────────────────────
function exportJSON() {
  const blob = new Blob([JSON.stringify(buildData(),null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`dm-backup-${today()}.json`;
  a.click(); URL.revokeObjectURL(a.href);
}

function importJSON() {
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='application/json';
  inp.onchange=async()=>{
    const file=inp.files?.[0]; if(!file) return;
    try {
      const raw=JSON.parse(await file.text());
      if(!Array.isArray(raw.events)) return toast('Formato no reconocido');
      const merged=mergeEvents(events,raw.events);
      events=merged; state=deriveState(events);
      await dbSet('events',events); renderAll();
      toast(`✓ Importado · ${events.length} eventos`);
    } catch(e) { toast('Error: '+e.message); }
  };
  inp.click();
}

// Guardar datos localmente en IndexedDB
async function saveLocal() {
  try {
    const data = buildData();
    await dbSet('data', data);
  } catch(e) {
    console.error('Error guardando datos locales:', e);
  }
}

// Cargar datos desde IndexedDB
async function loadLocal() {
  try {
    const saved = await dbGet('data');
    if (saved) {
      loadFromData(saved);
    }
  } catch(e) {
    console.error('Error cargando datos locales:', e);
  }
}

//  BORRAR TODOS LOS DATOS
function confirmDeleteAll() {
  // Crear un modal especial para el borrado
  const modal = document.getElementById('modal');
  const modalT = document.getElementById('modalT');
  const modalB = document.getElementById('modalB');
  const modalA = document.getElementById('modalA');
  
  modalT.textContent = ' Borrar todos los datos';
  modalB.innerHTML = `
    ¿Estás seguro de que quieres borrar TODOS los datos locales?<br><br>
    Esto eliminará permanentemente:<br>
    <strong>${events.length} eventos</strong><br>
    Todos los ingredientes, recetas, ventas, pedidos, etc.<br><br>
    <strong style="color:var(--danger)">Esta acción no se puede deshacer</strong><br><br>
    Para continuar, escribe: <code>BORRAR</code><br><br>
    <input type="text" id="deleteConfirmInput" placeholder="Escribe BORRAR para confirmar" 
           style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;
                  background:rgba(34,22,9,.88);color:var(--txt);font-size:1rem;
                  text-align:center;font-weight:bold;">
  `;
  
  modalA.innerHTML = `
    <button class="btn" onclick="closeDeleteModal()">Cancelar</button>
    <button class="btn btn-d" onclick="attemptDelete()">Borrar datos</button>
  `;
  
  modal.classList.remove('hidden');
  
  // Focus automático y manejo del input
  setTimeout(() => {
    const input = document.getElementById('deleteConfirmInput');
    if (input) {
      input.focus();
      input.onkeydown = (e) => {
        if (e.key === 'Enter') {
          attemptDelete();
        }
      };
    }
  }, 100);
}

function closeDeleteModal() {
  document.getElementById('modal').classList.add('hidden');
}

function attemptDelete() {
  const input = document.getElementById('deleteConfirmInput');
  if (!input) return;
  
  if (input.value.trim() === 'BORRAR') {
    deleteAllData();
  } else {
    toast('Debes escribir BORRAR exactamente para confirmar');
    input.value = '';
    input.focus();
  }
}

async function deleteAllData() {
  try {
    setSyncStatus('Borrando todos los datos...', 'syncing');
    
    // Borrar eventos locales
    events = [];
    state = deriveState(events);
    await dbSet('events', events);
    
    // Limpiar último action ID
    lastActionId = null;
    
    // Actualizar UI
    renderAll();
    setSyncStatus('Todos los datos borrados', 'ok');
    toast(' Todos los datos han sido borrados permanentemente');
    
    // Cerrar modal
    document.getElementById('modal').classList.add('hidden');
    
  } catch(e) {
    setSyncStatus('Error al borrar datos');
    toast('Error al borrar datos: ' + e.message);
  }
}

//  NAVEGACIÓN
// ════════════════════════════════════════════════════════
function go(sec) {
  SECTIONS.forEach(s=>{
    document.getElementById('s-'+s).classList.toggle('on',s===sec);
    const tab=document.getElementById('t-'+s);
    if(tab) tab.classList.toggle('on',s===sec);
  });
}

// ── Atajo: abrir compras desde stock bajo
function quickCompra(nombre) {
  go('compras'); const el=$('cIng');
  if(el){el.value=nombre; el.focus();}
}

// ════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════
function renderSelects() {
  const opts='<option value=""> Seleccionar </option>' +
    recetas.map(r=>`<option value="${r.id}">${r.nombre||'?'} (${stockProducto(r.id)}u)</option>`).join('');
  ['vRec','pRec','prRec','mRec'].forEach(id=>{if($(id))$(id).innerHTML=opts;});
}

function renderHome() {
  const h     = today();
  const vHoy  = ventas.filter(v=>v.fecha===h&&v.cobrado!==false);
  const inHoy = vHoy.reduce((a,v)=>a+Number(v.unidades||0)*Number(v.precio||0),0);
  const pAct  = pedidos.filter(p=>p.estado!=='entregado').length;
  const sLow  = ingredientes.filter(i=>Number(i.stock||0)<=Number(i.min||0)).length;
  $('kpiHome').innerHTML = `
    <div class="ki" onclick="homeKpi('fin')"><div class="kv">${money(inHoy)}</div><div class="kl">Ingresos hoy</div></div>
    <div class="ki" onclick="homeKpi('ventas')"><div class="kv">${vHoy.length}</div><div class="kl">Ventas hoy</div></div>
    <div class="ki" onclick="homeKpi('pedidos')"><div class="kv">${pAct}</div><div class="kl">Pedidos activos</div></div>
    <div class="ki" onclick="homeKpi('low')"><div class="kv ${sLow?'':''}">
      ${sLow>0?`<span style="color:var(--danger)">${sLow}</span>`:0}</div>
      <div class="kl">Stock bajo mínimo</div></div>`;
  renderLowPanel();
}

function homeKpi(action) {
  if(action==='low'){lowOpen=!lowOpen; renderLowPanel(); return;}
  go(action);
}

function renderLowPanel() {
  const p=$('lowPanel');
  if(!lowOpen){p.classList.add('hidden');return;}
  const list=ingredientes.filter(i=>Number(i.stock||0)<=Number(i.min||0))
    .sort((a,b)=>Number(a.stock||0)-Number(b.stock||0)).slice(0,12);
  if(!list.length){
    p.classList.remove('hidden');
    p.innerHTML='<p style="font-size:.8rem;color:var(--ok)">Todo el stock está bien 🎉</p>';
    return;
  }
  p.classList.remove('hidden');
  p.innerHTML=list.map(i=>`
    <div class="srow" onclick="quickCompra('${String(i.nombre||'').replace(/'/g,"\\'")}')">
      <span style="font-weight:700">${i.nombre}</span>
      <span style="color:var(--warn);font-weight:700">${Number(i.stock||0)} / min ${Number(i.min||0)} ${i.unidad||''}</span>
    </div>`).join('');
}

function renderVentas() {
  const list=[...ventas].sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||'')).slice(0,15);
  $('vList').innerHTML=list.map(v=>{
    const r=recById(v.recetaId);
    return `<div class="li">
      <div style="display:flex;justify-content:space-between">
        <div class="li-t">${r?.nombre||'?'} · ${v.unidades}u</div>
        <div style="color:var(--gold);font-weight:700">${money(Number(v.unidades||0)*Number(v.precio||0))}</div>
      </div>
      <div class="li-s">${v.fecha||''} · ${v.canal||'directo'}${v.nota?' · '+v.nota:''}</div>
    </div>`;
  }).join('')||'<p style="color:var(--muted);font-size:.84rem">Sin ventas</p>';
}

function renderPedidos() {
  const list=pedidos.filter(p=>p.estado!=='entregado')
    .sort((a,b)=>String(a.fechaEntrega||'').localeCompare(String(b.fechaEntrega||'')));
  $('pList').innerHTML=list.map(p=>{
    const tot=(p.items||[]).reduce((a,it)=>a+Number(it.cantidad||0)*Number(it.precio||0),0);
    return `<div class="li">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="li-t">${p.cliente||'Cliente'}</div>
        <span class="badge ${p.estado==='pendiente'?'b-w':'b-ok'}">${p.estado||'pendiente'}</span>
      </div>
      <div class="li-s">Entrega: ${p.fechaEntrega||'s/f'} · ${money(tot)}${p.anticipo?` · Ant: ${money(p.anticipo)}`:''}</div>
    </div>`;
  }).join('')||'<p style="color:var(--muted);font-size:.84rem">Sin pedidos activos</p>';
}

function renderCompras() {
  const list=[...historialCompras].sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||'')).slice(0,15);
  $('cList').innerHTML=list.map(c=>{
    const ing=ingById(c.ingId)||{nombre:c.ingNombre||'?',unidad:''};
    return `<div class="li">
      <div style="display:flex;justify-content:space-between">
        <div class="li-t">${ing.nombre} · ${c.qty} ${ing.unidad}</div>
        <div style="color:var(--gold);font-weight:700">${money(Number(c.qty||0)*Number(c.precio||0))}</div>
      </div>
      <div class="li-s">${c.fecha||''}</div>
    </div>`;
  }).join('')||'<p style="color:var(--muted);font-size:.84rem">Sin compras</p>';
}

function renderProduccion() {
  const list=[...producciones].sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||'')).slice(0,15);
  $('prList').innerHTML=list.map(p=>{
    const r=recById(p.recetaId);
    return `<div class="li">
      <div class="li-t">${r?.nombre||'?'} · ${p.tandas} tanda${p.tandas!==1?'s':''}</div>
      <div class="li-s">${p.fecha||''} · ${p.unidadesReales||0}u producidas</div>
    </div>`;
  }).join('')||'<p style="color:var(--muted);font-size:.84rem">Sin producción</p>';
}

function renderMermas() {
  const list=[...mermas].sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||'')).slice(0,15);
  $('mList').innerHTML=list.map(m=>{
    const r=recById(m.recetaId);
    return `<div class="li">
      <div style="display:flex;justify-content:space-between">
        <div class="li-t">${r?.nombre||'?'}</div>
        <div style="color:var(--danger);font-weight:700">−${m.cantidad}u</div>
      </div>
      <div class="li-s">${m.fecha||''} · ${m.motivo||'Sin motivo'}</div>
    </div>`;
  }).join('')||'<p style="color:var(--muted);font-size:.84rem">Sin mermas</p>';
}

function renderFinanzas() {
  const vt=ventas.reduce((a,v)=>a+Number(v.unidades||0)*Number(v.precio||0),0);
  const ct=historialCompras.reduce((a,c)=>a+Number(c.qty||0)*Number(c.precio||0),0);
  const et=extracciones.reduce((a,e)=>a+Number(e.monto||0),0);
  const rt=vt-ct-et;
  $('finKpi').innerHTML=`
    <div class="ki"><div class="kv" style="color:var(--ok)">${money(vt)}</div><div class="kl">Ventas totales</div></div>
    <div class="ki"><div class="kv" style="color:var(--danger)">${money(ct)}</div><div class="kl">Compras totales</div></div>
    <div class="ki"><div class="kv" style="color:var(--warn)">${money(et)}</div><div class="kl">Extracciones</div></div>
    <div class="ki"><div class="kv" style="color:${rt>=0?'var(--ok)':'var(--danger)'}">${money(rt)}</div><div class="kl">Resultado</div></div>`;

  // Recetas
  $('recList').innerHTML=recetas.length
    ? recetas.map(r=>`
      <div class="rec-row">
        <span style="font-weight:700">${r.nombre}</span>
        <span style="color:var(--muted);font-size:.78rem">Rinde ${r.rinde||'?'}u · Stock ${stockProducto(r.id)}u</span>
      </div>`).join('')
    : '<p style="color:var(--muted);font-size:.84rem">Sin recetas — agrega una arriba</p>';
}

function renderAll() {
  renderSelects();
  renderHome(); renderVentas(); renderPedidos();
  renderCompras(); renderProduccion(); renderMermas(); renderFinanzas();
}
